plugins: null
nodes:
- name: standardizer
  class_name: cuvis_ai_inspecscrap.node.normalization.PerChannelStandardizer
  hparams:
    in_channels: 437
    eps: 1.0e-06
- name: classifier
  class_name: cuvis_ai_inspecscrap.node.classification.mlp.SpectralMLPClassifier
  hparams:
    in_channels: 437
    num_classes: 14
    hidden1: 256
    hidden2: 128
    dropout: 0.0
- name: loss
  class_name: cuvis_ai_inspecscrap.node.losses.WeightedCrossEntropyLoss
  hparams:
    num_classes: 14
    class_weights:
    - 0.3034605146406389
    - 1.1916376306620209
    - 24.428571428571427
    - 0.6514285714285715
    - 0.0
    - 0.42857142857142855
    - 4.441558441558442
    - 1.6018735362997658
    - 2.124223602484472
    - 1.9542857142857142
    - 0.4362244897959184
    - 1.1231527093596059
    - 1.163265306122449
    - 12.214285714285714
    weight: 1.0
    ignore_index: -100
    label_smoothing: 0.0
- name: metrics
  class_name: cuvis_ai_inspecscrap.node.metrics.MulticlassSegmentationMetrics
  hparams:
    num_classes: 14
    ignore_index: -100
    class_names:
    - steel
    - aluminium
    - copper
    - dark_rust_metal
    - light_rust_metal
    - painted_metal
    - can
    - stone
    - wood
    - painted_wood
    - plastic
    - rubber
    - styropor
    - fabric
    execution_stages: null
connections:
- source: standardizer.outputs.normalized
  target: classifier.inputs.patches
- source: classifier.outputs.logits
  target: loss.inputs.logits
- source: classifier.outputs.logits
  target: metrics.inputs.logits
metadata:
  name: Metal_Scrap_MLP
  description: mlp patch classifier, framework-trained (200 epochs).
  created: ''
  tags:
  - metal_scrap
  - mlp
  author: ''
  cuvis_ai_version: 0.7.0
