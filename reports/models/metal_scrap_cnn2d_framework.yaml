plugins: null
nodes:
- name: standardizer
  class_name: cuvis_ai_inspecscrap.node.normalization.PerChannelStandardizer
  hparams:
    in_channels: 437
    eps: 1.0e-06
- name: classifier
  class_name: cuvis_ai_inspecscrap.node.classification.cnn2d.SpatialSpectralCNN2D
  hparams:
    in_channels: 437
    num_classes: 14
    channels:
    - 32
    - 64
    - 128
- name: loss
  class_name: cuvis_ai_inspecscrap.node.losses.WeightedCrossEntropyLoss
  hparams:
    num_classes: 14
    class_weights:
    - 0.2650218861918026
    - 1.7951482479784366
    - 11.892857142857142
    - 0.5170807453416149
    - 0.0
    - 0.5170807453416149
    - 1.6989795918367347
    - 1.9028571428571428
    - 1.6989795918367347
    - 1.9028571428571428
    - 0.4641114982578397
    - 1.559718969555035
    - 2.1623376623376624
    - 4.324675324675325
    weight: 1.0
    ignore_index: -100
    label_smoothing: 0.0
- name: metrics
  class_name: cuvis_ai_inspecscrap.node.metrics.MulticlassSegmentationMetrics
  hparams:
    num_classes: 14
    ignore_index: -100
    class_names:
    - steel
    - aluminium
    - copper
    - dark_rust_metal
    - light_rust_metal
    - painted_metal
    - can
    - stone
    - wood
    - painted_wood
    - plastic
    - rubber
    - styropor
    - fabric
    execution_stages: null
connections:
- source: standardizer.outputs.normalized
  target: classifier.inputs.patches
- source: classifier.outputs.logits
  target: loss.inputs.logits
- source: classifier.outputs.logits
  target: metrics.inputs.logits
metadata:
  name: Metal_Scrap_CNN2D
  description: cnn2d patch classifier, framework-trained (200 epochs).
  created: ''
  tags:
  - metal_scrap
  - cnn2d
  author: ''
  cuvis_ai_version: 0.7.0
