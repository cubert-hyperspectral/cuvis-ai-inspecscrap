# Metal-scrap MLP trainrun (framework path: StatisticalTrainer is a no-op here, GradientTrainer
# trains the classifier). Run with:
#   restore-trainrun --trainrun-path configs/trainrun/metal_scrap_mlp.yaml \
#     --plugins-dir configs/plugins --plugins-dir <cuvis-ai>/configs/plugins --mode {info|train}
# The 1-epoch smoke uses scripts/train_metal_scrap.py; this config carries the full EOBD settings.
name: metal_scrap_mlp
pipeline: ../pipeline/metal_scrap_mlp.yaml
data:
  data_module: metal_scrap_patch
  batch_size: 256
  params:
    root: data/HSIMetalScrap
    patch_size: 7
    train_samples: 600
    val_samples: 400
    eval_cap: 5000
    seed: 42
training:
  seed: 42
  optimizer:
    name: adam
    lr: 0.001
  trainer:
    max_epochs: 25
    accelerator: auto
    devices: 1
    precision: 32-true
    enable_progress_bar: true
    enable_checkpointing: false
    log_every_n_steps: 10
unfreeze_nodes: [classifier]
loss_nodes: [loss]
metric_nodes: [metrics]
output_dir: outputs/metal_scrap_mlp
