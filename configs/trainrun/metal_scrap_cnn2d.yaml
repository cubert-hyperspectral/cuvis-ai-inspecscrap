# Metal-scrap 2D-CNN trainrun. See metal_scrap_mlp.yaml for the run commands and the smoke note.
name: metal_scrap_cnn2d
pipeline: ../pipeline/metal_scrap_cnn2d.yaml
data:
  data_module: metal_scrap_patch
  batch_size: 256
  params:
    root: data/HSIMetalScrap
    patch_size: 7
    train_samples: 600
    val_samples: 400
    eval_cap: 5000
    seed: 42
training:
  seed: 42
  optimizer:
    name: adam
    lr: 0.001
  trainer:
    max_epochs: 25
    accelerator: auto
    devices: 1
    precision: 32-true
    enable_progress_bar: true
    enable_checkpointing: false
    log_every_n_steps: 10
unfreeze_nodes: [classifier]
loss_nodes: [loss]
metric_nodes: [metrics]
output_dir: outputs/metal_scrap_cnn2d
